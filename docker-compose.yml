services:
  cloudgamecatalog.api:
    image: ${DOCKER_REGISTRY-}cloudgamecatalogapi
    build:
      context: .
      dockerfile: ./src/CloudGameCatalog.Api/Dockerfile
    user: "root"
    ports:
      - '57398:8080'
      - '57399:8081'
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false      
      - ASPNETCORE_ENVIRONMENT=Docker
      - DOTNET_ENVIRONMENT=Docker
    volumes:
    - ./src/CloudGameCatalog.Api/Logs:/app/Logs
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cloudgame-network

  cloudgamecatalog.consumer:
    image: ${DOCKER_REGISTRY-}cloudgamecatalogconsumer
    build:
      context: .
      dockerfile: ./src/CloudGameCatalog.Consumer/Dockerfile
    user: "root"
    environment:
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false
      - ASPNETCORE_ENVIRONMENT=Docker
      - DOTNET_ENVIRONMENT=Docker
    volumes:
    - ./src/CloudGameCatalog.Consumer/Logs:/app/Logs
    restart: unless-stopped    
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cloudgame-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    hostname: 'sqlserver'
    container_name: sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: "CloudGame#2026"
    volumes:
      - sql_data:/var/opt/mssql
    restart: unless-stopped
    ports:
      - '1433:1433'    
    healthcheck:
      test: ['CMD-SHELL', '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" -b -o /dev/null']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cloudgame-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    hostname: 'rabbitmq'
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # UI
    environment:
      RABBITMQ_DEFAULT_USER: cloudgame
      RABBITMQ_DEFAULT_PASS: CloudGame#2026Rbt
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - cloudgame-network

volumes:
  sql_data:
  rabbitmq_data:

networks:
  cloudgame-network:
    name: cloudgame-network
    driver: bridge